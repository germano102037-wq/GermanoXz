<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Override | 7º B</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;900&family=JetBrains+Mono:wght@100&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text: #ffffff;
            --text-dim: #666666;
            --font-scale: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            font-size: calc(16px * var(--font-scale));
            transition: all 0.5s ease;
        }

        /* --- ANIMAÇÕES --- */
        @keyframes entrar {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animar { animation: entrar 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* --- RELÓGIO GIGANTE (TELA CHEIA) --- */
        #tela-cheia-relogio {
            display: none; position: fixed; inset: 0; background: black; z-index: 30000;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #relogio-gigante { 
            font-size: 18vw; font-weight: 100; font-family: 'JetBrains Mono', monospace; 
            letter-spacing: -10px; line-height: 1;
        }
        #data-gigante { font-size: 2vw; letter-spacing: 15px; color: #333; text-transform: uppercase; margin-top: 10px; }

        /* --- INTERFACE PRINCIPAL --- */
        header { width: 100%; padding: 80px 20px 40px; text-align: center; }
        #clock { font-size: 7rem; font-weight: 100; letter-spacing: -6px; font-family: 'JetBrains Mono', monospace; }
        #date-text { font-size: 0.7rem; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; }

        .main-container { width: 90%; max-width: 900px; margin-top: 40px; }
        .hero-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 40px;
            padding: 80px 40px; text-align: center; backdrop-filter: blur(30px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .status-tag { font-size: 0.6rem; letter-spacing: 5px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; display: block; }
        .prof-name { font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .subject-name { font-size: 1.5rem; color: var(--text-dim); margin: 15px 0 40px; font-weight: 300; }

        .barra-progresso { width: 100%; height: 1px; background: var(--border); position: relative; margin-bottom: 20px; }
        .preenchimento { position: absolute; height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; box-shadow: 0 0 20px white; }

        /* --- LISTA --- */
        .item-lista { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid var(--border); }
        .item-meta { font-size: 0.8rem; color: var(--text-dim); }

        /* --- PAINEL ADMIN --- */
        #admin-lateral {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
            background: #080808; border-left: 1px solid #1a1a1a; z-index: 10000;
            padding: 40px; transition: 0.7s cubic-bezier(0.8, 0, 0.2, 1); overflow-y: auto;
        }
        #admin-lateral.active { right: 0; }
        .admin-label { display: block; font-size: 0.55rem; color: #555; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px; }
        .admin-btn { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 12px; cursor: pointer; font-size: 0.7rem; margin-bottom: 8px; font-weight: 600; }
        .admin-btn:hover { background: #fff; color: #000; }
        .admin-input { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 10px; font-size: 0.8rem; margin-bottom: 10px; outline: none; }

        /* --- LOGIN --- */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 40000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        #login-input { background: transparent; border: none; border-bottom: 2px solid #222; color: white; font-size: 5rem; width: 250px; text-align: center; outline: none; font-family: 'JetBrains Mono'; }

        footer { padding: 100px; opacity: 0.1; letter-spacing: 20px; font-weight: 900; }
    </style>
</head>
<body>

<div id="tela-cheia-relogio" onclick="fecharRelogioGigante()">
    <div id="relogio-gigante">00:00:00</div>
    <div id="data-gigante">DATA DO SISTEMA</div>
    <div style="position: absolute; bottom: 40px; color: #222; font-size: 0.6rem; letter-spacing: 5px;">TOQUE PARA SAIR</div>
</div>

<div id="login-overlay">
    <div style="letter-spacing: 10px; font-size: 0.6rem; color: #333; margin-bottom: 20px;">ACESSO RESTRITO</div>
    <input type="password" id="login-input" maxlength="2">
</div>

<aside id="admin-lateral">
    <div style="font-size: 0.6rem; letter-spacing: 5px; color: #333; margin-bottom: 40px;">MODO ADMIN</div>

    <div style="margin-bottom: 30px;">
        <label class="admin-label">Controle de Exibição</label>
        <button class="admin-btn" onclick="abrirRelogioGigante()">TELA CHEIA (HORA + SEG)</button>
        <button class="admin-btn" onclick="ativarEdicao()">EDITAR TEXTOS</button>
    </div>

    <div style="margin-bottom: 30px;">
        <label class="admin-label">Navegação Temporal</label>
        <div style="display: flex; gap: 5px;">
            <button class="admin-btn" onclick="mudarDia(-1)">-1 DIA</button>
            <button class="admin-btn" onclick="mudarDia(1)">+1 DIA</button>
        </div>
        <button class="admin-btn" onclick="resetarTudo()">HORA REAL</button>
    </div>

    <div style="margin-bottom: 30px;">
        <label class="admin-label">Ajuste de Horário</label>
        <div style="display: flex; gap: 5px;">
            <button class="admin-btn" onclick="mudarHora(-3600)">-1H</button>
            <button class="admin-btn" onclick="mudarHora(3600)">+1H</button>
        </div>
    </div>

    <div style="margin-bottom: 30px;">
        <label class="admin-label">Visual</label>
        <input type="color" class="admin-input" oninput="mudarCor('--accent', this.value)">
    </div>

    <button class="admin-btn" style="background: #200; color: #f44; border: none; margin-top: 20px;" onclick="location.reload()">REINICIAR TUDO</button>
</aside>

<header class="animar">
    <div id="clock">00:00:00</div>
    <div id="date-text">...</div>
</header>

<div class="main-container animar" style="animation-delay: 0.2s;">
    <div class="hero-card">
        <span class="status-tag">Monitorando Cronograma</span>
        <h2 id="main-prof" class="prof-name">Aguardando</h2>
        <p id="main-subject" class="subject-name">Sincronizando...</p>
        <div class="barra-progresso">
            <div id="bar-fill" class="preenchimento"></div>
        </div>
        <div id="main-timer" style="font-family: 'JetBrains Mono'; font-size: 0.9rem; letter-spacing: 4px;">00:00:00</div>
    </div>
</div>

<div class="main-container animar" style="animation-delay: 0.4s; margin-bottom: 100px;">
    <h3 style="font-size: 0.6rem; letter-spacing: 5px; color: #222; text-transform: uppercase; margin-bottom: 30px;">Próximos Compromissos</h3>
    <div id="lista-proximas"></div>
</div>

<footer>GERMANO</footer>

<script>
    const grade7B = {
        1: [
            { s: "07:30", e: "08:20", t: "História", p: "Francielle" },
            { s: "08:20", e: "09:10", t: "História", p: "Francielle" },
            { s: "09:10", e: "09:30", t: "INTERVALO", p: "Pátio" },
            { s: "09:30", e: "10:20", t: "Matemática", p: "Denice" },
            { s: "10:20", e: "11:10", t: "Matemática", p: "Denice" },
            { s: "11:10", e: "12:00", t: "P.T.", p: "Ana Paula" },
            { s: "12:00", e: "12:50", t: "Ciências", p: "Valdemar" }
        ],
        2: [
            { s: "07:30", e: "08:20", t: "Gramática", p: "Adília" },
            { s: "08:20", e: "09:10", t: "Intel. Cria. E Dig.", p: "Flávia" },
            { s: "09:10", e: "09:30", t: "INTERVALO", p: "Pátio" },
            { s: "09:30", e: "10:20", t: "Matemática", p: "Denice" },
            { s: "10:20", e: "11:10", t: "Ed. Física", p: "Marcelo" },
            { s: "11:10", e: "12:00", t: "Laboratório", p: "Mª Catarina" }
        ],
        3: [
            { s: "07:30", e: "08:20", t: "Inglês", p: "Mônica" },
            { s: "08:20", e: "09:10", t: "Artes", p: "Claudio" },
            { s: "09:10", e: "09:30", t: "INTERVALO", p: "Pátio" },
            { s: "09:30", e: "10:20", t: "Ciências", p: "Valdemar" },
            { s: "10:20", e: "11:10", t: "P.T.", p: "Ana Paula" },
            { s: "11:10", e: "12:00", t: "Ed. Física", p: "Marcelo" }
        ],
        4: [
            { s: "07:30", e: "08:20", t: "Prat. Leit. e Escrita", p: "Paula M." },
            { s: "08:20", e: "09:10", t: "Oficina de Inglês", p: "Priscila" },
            { s: "09:10", e: "09:30", t: "INTERVALO", p: "Pátio" },
            { s: "09:30", e: "10:20", t: "Inglês", p: "Mônica" },
            { s: "10:20", e: "11:10", t: "Gramática", p: "Adília" },
            { s: "11:10", e: "12:00", t: "Gramática", p: "Adília" }
        ],
        5: [
            { s: "07:30", e: "08:20", t: "P.T.", p: "Ana Paula" },
            { s: "08:20", e: "09:10", t: "Geografia", p: "Wilson" },
            { s: "09:10", e: "09:30", t: "INTERVALO", p: "Pátio" },
            { s: "09:30", e: "10:20", t: "Geografia", p: "Wilson" },
            { s: "10:20", e: "11:10", t: "Matemática", p: "Denice" },
            { s: "11:10", e: "12:00", t: "Matemática", p: "Denice" }
        ]
    };

    let offsetHora = 0;
    let offsetDia = 0;
    let bufferTeclado = "";

    function atualizar() {
        let agora = new Date();
        if (offsetHora !== 0) agora.setSeconds(agora.getSeconds() + offsetHora);
        if (offsetDia !== 0) agora.setDate(agora.getDate() + offsetDia);
        
        const h = agora.getHours().toString().padStart(2, '0');
        const m = agora.getMinutes().toString().padStart(2, '0');
        const s = agora.getSeconds().toString().padStart(2, '0');

        const tempoFormatado = `${h}:${m}:${s}`;
        document.getElementById('clock').textContent = tempoFormatado;
        document.getElementById('relogio-gigante').textContent = tempoFormatado;
        
        const dataFormatada = agora.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'long'}).toUpperCase();
        document.getElementById('date-text').textContent = dataFormatada;
        document.getElementById('data-gigante').textContent = dataFormatada;

        const dia = agora.getDay();
        const tempoSeg = (agora.getHours() * 3600) + (agora.getMinutes() * 60) + agora.getSeconds();
        const grade = grade7B[dia] || [];

        const heroProf = document.getElementById('main-prof');
        const heroSub = document.getElementById('main-subject');
        const heroTimer = document.getElementById('main-timer');
        const barra = document.getElementById('bar-fill');
        const lista = document.getElementById('lista-proximas');

        let aulaEncontrada = false;
        let htmlProx = "";

        grade.forEach(c => {
            const [sH, sM] = c.s.split(':').map(Number);
            const [eH, eM] = c.e.split(':').map(Number);
            const sSeg = (sH * 3600) + (sM * 60);
            const eSeg = (eH * 3600) + (eM * 60);

            if (tempoSeg >= sSeg && tempoSeg < eSeg) {
                heroProf.textContent = c.p;
                heroSub.textContent = c.t;
                const perc = ((tempoSeg - sSeg) / (eSeg - sSeg)) * 100;
                barra.style.width = perc + "%";
                const r = eSeg - tempoSeg;
                heroTimer.textContent = `${Math.floor(r/3600).toString().padStart(2,'0')}:${Math.floor((r%3600)/60).toString().padStart(2,'0')}:${(r%60).toString().padStart(2,'0')}`;
                aulaEncontrada = true;
            } else if (tempoSeg < sSeg) {
                htmlProx += `
                <div class="item-lista">
                    <div>
                        <div style="font-weight: 600;">${c.t}</div>
                        <div class="item-meta">Prof. ${c.p} • Início: ${c.s}</div>
                    </div>
                    <div style="font-family: 'JetBrains Mono'; font-size: 0.7rem;">-${Math.floor((sSeg-tempoSeg)/60)}m</div>
                </div>`;
            }
        });

        if (!aulaEncontrada) {
            heroProf.textContent = "NENHUMA AULA";
            heroSub.textContent = "Fora do horário";
            barra.style.width = "0%";
            heroTimer.textContent = "00:00:00";
        }
        lista.innerHTML = htmlProx || "<div style='color: #111; text-align: center; margin-top: 50px;'>CRONOGRAMA CONCLUÍDO</div>";
    }

    // ADMIN
    function mudarCor(n, v) { document.documentElement.style.setProperty(n, v); }
    function mudarHora(s) { offsetHora += s; atualizar(); }
    function mudarDia(d) { offsetDia += d; atualizar(); }
    function resetarTudo() { offsetHora = 0; offsetDia = 0; atualizar(); }
    function ativarEdicao() {
        const p = document.getElementById('main-prof');
        const s = document.getElementById('main-subject');
        const modo = p.contentEditable === "true";
        p.contentEditable = !modo; s.contentEditable = !modo;
        p.style.border = modo ? "none" : "1px dashed #333";
    }
    function abrirRelogioGigante() { document.getElementById('tela-cheia-relogio').style.display = 'flex'; }
    function fecharRelogioGigante() { document.getElementById('tela-cheia-relogio').style.display = 'none'; }

    window.addEventListener('keydown', (e) => {
        bufferTeclado += e.key;
        if(bufferTeclado.length > 10) bufferTeclado = bufferTeclado.substring(1);
        if(bufferTeclado.includes("3115")) {
            bufferTeclado = "";
            document.getElementById('login-overlay').style.display = 'flex';
            const input = document.getElementById('login-input');
            input.value = ""; input.focus();
            input.oninput = () => {
                if(input.value === "16") {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-lateral').classList.add('active');
                }
            }
        }
        if(e.key === "Escape") {
            document.getElementById('admin-lateral').classList.remove('active');
            document.getElementById('login-overlay').style.display = 'none';
            fecharRelogioGigante();
        }
    });

    setInterval(atualizar, 1000);
    atualizar();
</script>

</body>
</html>
